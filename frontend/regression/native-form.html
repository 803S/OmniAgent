<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Regression Fixture - Native Form</title>
    <style>
      :root {
        --bg: #fbf8f2;
        --card: #fffdf8;
        --ink: #1b232c;
        --muted: #61707d;
        --line: rgba(27, 35, 44, 0.12);
        --accent: #1f7a6b;
        --accent-2: #d76b3b;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Avenir Next", "PingFang SC", "Noto Sans SC", sans-serif;
        color: var(--ink);
        background:
          linear-gradient(135deg, rgba(31, 122, 107, 0.12), transparent 40%),
          linear-gradient(180deg, #fffdf8 0%, var(--bg) 100%);
      }
      main {
        max-width: 1120px;
        margin: 0 auto;
        padding: 28px 20px 60px;
      }
      .topbar {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        align-items: end;
        margin-bottom: 22px;
      }
      h1 {
        margin: 0;
        font-size: clamp(30px, 5vw, 48px);
      }
      p { color: var(--muted); }
      .layout {
        display: grid;
        grid-template-columns: 1.1fr 0.9fr;
        gap: 18px;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 24px;
        padding: 22px;
        box-shadow: 0 18px 42px rgba(27, 35, 44, 0.08);
      }
      .field {
        display: grid;
        gap: 8px;
        margin-bottom: 16px;
      }
      label {
        font-weight: 700;
      }
      input, textarea, select, button {
        font: inherit;
      }
      input, textarea, select {
        width: 100%;
        padding: 12px 14px;
        border-radius: 14px;
        border: 1px solid rgba(27, 35, 44, 0.18);
        background: #fff;
      }
      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 18px;
      }
      button, .ghost-link {
        border: 0;
        cursor: pointer;
        border-radius: 999px;
        padding: 12px 18px;
        background: var(--accent);
        color: #fff;
        text-decoration: none;
      }
      .secondary {
        background: rgba(27, 35, 44, 0.08);
        color: var(--ink);
      }
      .signal {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 10px 14px;
        border-radius: 999px;
        background: rgba(31, 122, 107, 0.1);
        color: var(--accent);
        font-weight: 700;
      }
      #native-result {
        min-height: 72px;
        padding: 14px;
        border-radius: 18px;
        background: rgba(215, 107, 59, 0.08);
      }
      #event-log {
        margin: 0;
        padding-left: 18px;
        max-height: 420px;
        overflow: auto;
        color: var(--muted);
      }
      @media (max-width: 840px) {
        .layout { grid-template-columns: 1fr; }
        .topbar { flex-direction: column; align-items: start; }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="topbar">
        <div>
          <p class="signal">P0 · Native form regression</p>
          <h1>Native Form Fixture</h1>
          <p>适合验证 click、fill、select、press_key、fill_form 是否仍优先走稳定原生链路。</p>
        </div>
        <a class="ghost-link secondary" href="/frontend/regression">返回 fixture 目录</a>
      </div>

      <div class="layout">
        <section class="card">
          <form id="native-form">
            <div class="field">
              <label for="ticket-keyword">关键词输入框</label>
              <input id="ticket-keyword" name="keyword" placeholder="请输入关键词，比如 md5" autocomplete="off">
            </div>
            <div class="field">
              <label for="ticket-type">类型下拉框</label>
              <select id="ticket-type" name="kind">
                <option value="">请选择</option>
                <option value="article">文章</option>
                <option value="event">事件</option>
                <option value="ioc">IOC</option>
              </select>
            </div>
            <div class="field">
              <label for="ticket-note">备注输入框</label>
              <textarea id="ticket-note" name="note" rows="4" placeholder="输入一段说明，验证 textarea 填写"></textarea>
            </div>
            <div class="actions">
              <button id="search-button" type="submit">搜索按钮</button>
              <button id="clear-button" class="secondary" type="button">清空表单</button>
              <a id="details-link" class="ghost-link secondary" href="#native-result">查看结果区域</a>
            </div>
          </form>
        </section>

        <aside class="card">
          <h2>结果区域</h2>
          <p id="native-result">等待动作执行。</p>
          <h3>事件日志</h3>
          <ol id="event-log"></ol>
        </aside>
      </div>
    </main>
    <script>
      (function () {
        const logNode = document.getElementById("event-log");
        const resultNode = document.getElementById("native-result");
        const form = document.getElementById("native-form");
        const keyword = document.getElementById("ticket-keyword");
        const type = document.getElementById("ticket-type");
        const note = document.getElementById("ticket-note");
        const clearButton = document.getElementById("clear-button");

        function pushLog(message) {
          const item = document.createElement("li");
          item.textContent = new Date().toLocaleTimeString("zh-CN", { hour12: false }) + " · " + message;
          logNode.prepend(item);
        }

        [keyword, type, note].forEach((node) => {
          node.addEventListener("input", function (event) {
            pushLog(event.target.id + " -> input -> " + String(event.target.value || "").trim());
          });
          node.addEventListener("change", function (event) {
            pushLog(event.target.id + " -> change -> " + String(event.target.value || "").trim());
          });
        });

        keyword.addEventListener("keydown", function (event) {
          if (event.key === "Enter") {
            event.preventDefault();
            pushLog("ticket-keyword -> keydown Enter");
            form.requestSubmit();
          }
        });

        clearButton.addEventListener("click", function () {
          form.reset();
          resultNode.textContent = "表单已清空。";
          pushLog("clear-button -> click -> form reset");
        });

        form.addEventListener("submit", function (event) {
          event.preventDefault();
          const payload = {
            keyword: keyword.value.trim(),
            type: type.value,
            note: note.value.trim(),
          };
          resultNode.textContent = "已提交：" + JSON.stringify(payload, null, 2);
          pushLog("search-button -> submit -> " + JSON.stringify(payload));
        });
      })();
    </script>
  </body>
</html>
